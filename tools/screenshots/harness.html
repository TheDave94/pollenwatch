<!doctype html>
<html>
<head>
<meta charset="utf-8">
<!--
  Minimal render host for the PollenWatch card. Stubs HA's <ha-card> wrapper and
  loads the real shipped card bundle. shoot.mjs serves this file and maps
  /pollenwatch_card_static/* to custom_components/pollenwatch/frontend/*, so the
  card and its species icons resolve exactly as they do inside Home Assistant.
-->
<style>
  html, body { margin: 0; padding: 0; background: var(--app-bg, #f2f3f5); }
  #stage { padding: 22px; width: 520px; box-sizing: content-box; }
</style>
<script>
  class HaCard extends HTMLElement {
    constructor() {
      super();
      const r = this.attachShadow({ mode: 'open' });
      r.innerHTML = `<style>:host{display:block;
        background:var(--ha-card-background,var(--card-background-color,#fff));
        border-radius:var(--ha-card-border-radius,12px);
        box-shadow:var(--ha-card-box-shadow,0 2px 6px rgba(0,0,0,.12));
        border:1px solid var(--ha-card-border-color,var(--divider-color,rgba(0,0,0,.12)));
        color:var(--primary-text-color,#212121);overflow:hidden}</style><slot></slot>`;
    }
    set header(v) {}
    get header() { return ''; }
  }
  customElements.define('ha-card', HaCard);
</script>
<script src="/pollenwatch_card_static/pollenwatch-card.js"></script>
</head>
<body><div id="stage"></div></body>
</html>
