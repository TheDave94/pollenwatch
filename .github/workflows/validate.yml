name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: home-assistant/actions/hassfest@d05c25388490cd662baef8495e1bc764c3386153 # master @ 2026-06-09

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485 # main, pinned per oriel-dashboard (commit 2026-01-26)
        with:
          category: integration
          # Brand assets are submitted to home-assistant/brands as a separate
          # step when v1.0 publishes; skip the check until then.
          ignore: brands
