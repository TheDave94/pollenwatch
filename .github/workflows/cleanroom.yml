name: Cleanroom migration test

# Gates release/code-change PRs by running the full cleanroom-pretag harness
# (Gates A–D) on every PR that touches integration code or this workflow itself.
# Doc-only PRs are skipped to keep CI cycles cheap.
#
# This workflow is the load-bearing safety net for any future release
# automation (release-please, auto-merge). Make it a REQUIRED status check
# in branch protection ONCE the proofs in the opening PR show it both
# pass-when-good AND fail-when-bad.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      baseline:
        description: 'Pollenwatch baseline tag (default: cleanroom/config/pinned_release.json default)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  cleanroom-pretag:
    name: cleanroom-pretag (v1.3.0 → HEAD, Gates A–D)
    runs-on: ubuntu-latest
    # ~5–9 min wall-clock typical (docker pull + HACS install + onboarding +
    # entries + upgrade + verify). 25 min hard ceiling — if it hangs, fail
    # rather than burning runner time.
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Detect integration-code changes
        # Required-check + path-filter deadlock fix: this job must always exist
        # and report under its exact name on EVERY PR to main. Instead of
        # filtering the trigger by paths (which left non-integration PRs with a
        # never-reported required check = permanent BLOCK), the job always runs
        # and only the heavy Gates A–D steps below are gated on this filter.
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3 (pinned 2026-06-10)
        id: changes
        with:
          filters: |
            integration:
              - 'custom_components/pollenwatch/**'
              - 'cleanroom/**'
              - 'Makefile'
              - 'requirements-cleanroom.txt'
              - '.github/workflows/cleanroom.yml'

      - name: Neutral success (no integration-code changes)
        if: steps.changes.outputs.integration != 'true'
        run: echo "No integration-code changes — cleanroom harness not needed. Reporting success."

      - name: Set up Python 3.12
        if: steps.changes.outputs.integration == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install cleanroom requirements
        if: steps.changes.outputs.integration == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cleanroom.txt

      - name: Plant HACS PAT (from secret)
        if: steps.changes.outputs.integration == 'true'
        # bootstrap.py reads ~/.config/pollenwatch-cleanroom/github-pat with
        # mode-600 check. Plant the secret in the runner home and chmod it.
        # If the secret is missing/empty, bootstrap will fail with a clear
        # message — surface the empty-secret case explicitly here too.
        env:
          CLEANROOM_HACS_PAT: ${{ secrets.CLEANROOM_HACS_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${CLEANROOM_HACS_PAT:-}" ]; then
            echo "::error::Repository secret CLEANROOM_HACS_PAT is not set."
            echo "::error::Create it per cleanroom/README.md First-time setup: fine-grained PAT, Public Repositories (read-only)."
            exit 1
          fi
          install -d -m 0700 "$HOME/.config/pollenwatch-cleanroom"
          printf '%s' "$CLEANROOM_HACS_PAT" > "$HOME/.config/pollenwatch-cleanroom/github-pat"
          chmod 0600 "$HOME/.config/pollenwatch-cleanroom/github-pat"
          # Sanity (length only — never echo the secret).
          wc -c "$HOME/.config/pollenwatch-cleanroom/github-pat"

      - name: Cleanroom config lint (HACS pin + log-allowlist guard)
        if: steps.changes.outputs.integration == 'true'
        # Fail-fast before the long bootstrap. bootstrap.py also calls this
        # internally; running here gives an explicit GHA log step.
        run: make cleanroom-lint

      - name: make cleanroom-pretag (Gates A–D)
        if: steps.changes.outputs.integration == 'true'
        # Honors workflow_dispatch input if provided; else uses pinned default.
        run: |
          set -euo pipefail
          if [ -n "${BASELINE:-}" ]; then
            make cleanroom-pretag BASELINE="$BASELINE"
          else
            make cleanroom-pretag
          fi
        env:
          BASELINE: ${{ github.event.inputs.baseline }}
          # Make matches `PYTHON ?= python3`; setup-python put 3.12 on PATH as
          # python3, so no override needed.

      - name: Collect failure diagnostics (snapshots + logs + report.txt)
        # Always run on failure so the artifact has the gate-fail evidence.
        # Files in runs/<id>/config/ may be root-owned (HA inside docker),
        # so chown first to make them readable by upload-artifact.
        if: failure() && steps.changes.outputs.integration == 'true'
        run: |
          set -uo pipefail
          if [ -d cleanroom/runs ]; then
            sudo chown -R "$(id -u):$(id -g)" cleanroom/runs/ || true
            ls -la cleanroom/runs/ || true
          fi

      - name: Upload failure artifact
        if: failure() && steps.changes.outputs.integration == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cleanroom-fail-${{ github.run_id }}
          # Upload the per-run dir contents that matter for diagnosis:
          # snapshots/ (Gate B/D input), logs/, report.txt, meta.json.
          # Exclude the heavy config/ tree (recorder DB, .storage) by default
          # to keep artifacts small; include it if you ever need post-mortem.
          path: |
            cleanroom/runs/*/snapshots/**
            cleanroom/runs/*/logs/**
            cleanroom/runs/*/report.txt
            cleanroom/runs/*/meta.json
          if-no-files-found: warn
          retention-days: 14

      - name: Tear down container even if cleanup-all wasn't reached
        # Defensive: leftover pw-cleanroom-<ts> containers shouldn't persist
        # on the runner (the runner is ephemeral anyway, but tidy is tidy).
        # cleanup-all is name-prefix-filtered AND grep -v '^pw-cleanroom$'
        # so it cannot touch protected names — see cleanup.py PROTECTED set.
        if: always() && steps.changes.outputs.integration == 'true'
        run: make cleanroom-cleanup-all || true
