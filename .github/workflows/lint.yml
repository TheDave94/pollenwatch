name: Lint & Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint-test:
    name: Ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest
